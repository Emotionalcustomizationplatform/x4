<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Whisper • Real Sleep Companions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0a0a1f; --accent: #c8b6ff; --card: rgba(255,255,255,0.07); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin:0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 8vw, 5.5rem); line-height: 1.1; }
        .btn-hero { background: var(--accent); color: #000; padding: 16px 48px; border-radius: 50px; font-size: 1.15rem; text-decoration: none; }

        .section { padding: 80px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; }
        .companion-img { width: 100%; height: 240px; object-fit: cover; border-radius: 16px; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Let a Gentle Real Voice<br>Guide You to Sleep</h1>
        <p>真人ASMR · 个性化睡前故事 · 温暖陪伴</p>
        <a href="form.html" class="btn-hero">立即预约今晚</a>
    </section>

    <!-- 导师展示 + 音频 -->
    <section class="section">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:50px;">Meet Your Real Companions</h2>
            <div class="grid">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800" class="companion-img" alt="Elena">
                    <h3>Elena Voss</h3>
                    <p>Gentle British Whisperer</p>
                    <audio controls style="width:100%; margin-top:12px;">
                        <source src="YOUR_ELENA_AUDIO.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800" class="companion-img" alt="Marcus">
                    <h3>Marcus Reed</h3>
                    <p>Warm American Storyteller</p>
                    <audio controls style="width:100%; margin-top:12px;">
                        <source src="YOUR_MARCUS_AUDIO.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </div>
    </section>

    <!-- 定价 -->
    <section class="section">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:40px;">Choose Your Session</h2>
            <div class="grid">
                <div class="card">
                    <h3>30 Minutes</h3>
                    <div style="font-size:2.4rem;color:var(--accent);">$69</div>
                    <a href="form.html" class="btn-hero" style="padding:12px 32px;font-size:1rem;">立即预定</a>
                </div>
                <div class="card" style="border:2px solid var(--accent);">
                    <h3>60 Minutes</h3>
                    <div style="font-size:2.4rem;color:var(--accent);">$119</div>
                    <p style="color:var(--accent);"><strong>Most Popular</strong></p>
                    <a href="form.html" class="btn-hero" style="padding:12px 32px;font-size:1rem;">立即预定</a>
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/13045967785" style="position:fixed;bottom:30px;right:30px;width:65px;height:65px;background:#25D366;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 25px rgba(0,0,0,0.4);z-index:999;" target="_blank">💬</a>

</body>
</html>
