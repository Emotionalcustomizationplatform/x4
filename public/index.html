<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Luna Whisper - 真人ASMR睡眠陪伴">
  <title>Luna Whisper · 真人ASMR睡眠陪伴</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1f;
      --card: rgba(15,15,40,0.85);
      --border: rgba(200,182,255,0.2);
      --accent: #d4c3ff;
      --text: #ffffff;
      --text-secondary: #a8a8cc;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
    }
    .ambient-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 50% 10%, #1f1f4a 0%, #0a0a1f 75%);
    }
    .ambient-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 40% 30%, rgba(212,195,255,0.28) 0%, transparent 60%);
      animation: twinkle 20s infinite alternate ease-in-out;
    }
    @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 0.95; } }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 24px 0; transition: all 0.4s ease;
    }
    .navbar.scrolled {
      background: rgba(10,10,31,0.97);
      backdrop-filter: blur(24px);
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 160px 20px 120px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 10vw, 5.5rem);
      line-height: 1.05;
      margin-bottom: 24px;
      font-weight: 700;
    }
    .hero p {
      font-size: 1.35rem;
      color: var(--text-secondary);
      max-width: 740px;
      margin-bottom: 52px;
    }

    .trust-bar {
      display: flex; justify-content: center; gap: 60px;
      padding: 32px 60px; background: var(--card);
      border: 1px solid var(--border); border-radius: 28px;
      margin-bottom: 70px; flex-wrap: wrap;
    }

    .section { padding: 120px 0; }
    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.9rem; text-align: center; margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 36px;
    }

    .companion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .companion-card:hover {
      transform: translateY(-20px);
      border-color: var(--accent);
      box-shadow: 0 40px 80px rgba(212,195,255,0.22);
    }
    .companion-img {
      width: 100%; height: 380px; object-fit: cover;
      transition: transform 0.6s ease;
    }
    .companion-card:hover .companion-img {
      transform: scale(1.06);
    }
    .companion-info {
      padding: 32px 26px; text-align: center;
    }
    .companion-info h3 {
      font-size: 1.55rem; margin-bottom: 8px;
    }
    .companion-info p {
      color: var(--text-secondary); margin-bottom: 20px;
    }
  </style>
</head>
<body>
