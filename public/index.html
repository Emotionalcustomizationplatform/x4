<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Whisper • Real Sleep Companions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a1f;
            --accent: #c8b6ff;
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin:0; 
            line-height: 1.6;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
        
        .hero { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 100px 20px 80px; 
        }
        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.8rem, 8vw, 5.5rem); 
            line-height: 1.1; 
            margin-bottom: 20px; 
        }
        .hero p { font-size: 1.25rem; max-width: 680px; margin-bottom: 40px; color: #ccc; }

        .btn-hero { 
            background: var(--accent); 
            color: #000; 
            padding: 16px 48px; 
            border-radius: 50px; 
            font-size: 1.15rem; 
            font-weight: 600; 
            text-decoration: none; 
        }

        .section { padding: 80px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 6vw, 2.8rem); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 24px; 
        }
        .companion-card { 
            background: rgba(255,255,255,0.06); 
            border: 1px solid rgba(200,182,255,0.2); 
            border-radius: 20px; 
            overflow: hidden; 
        }
        .companion-img { width: 100%; height: 280px; object-fit: cover; }

        /* WhatsApp 浮动按钮 */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 68px;
            height: 68px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 999;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="container">
            <h1>Let a Gentle Real Voice<br>Guide You to Sleep</h1>
            <p>真人ASMR · 个性化睡前故事 · 温暖陪伴</p>
            <a href="form.html" class="btn-hero">立即预约今晚</a>
        </div>
    </section>

    <!-- 导师展示（保留两张） -->
    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2>Meet Your Real Companions</h2>
            </div>
            <div class="grid">
                <div class="companion-card">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800" alt="Elena" class="companion-img">
                    <div class="companion-info" style="padding:24px; text-align:center;">
                        <h3>Elena Voss</h3>
                        <p>Gentle British Whisperer</p>
                    </div>
                </div>
                <div class="companion-card">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800" alt="Marcus" class="companion-img">
                    <div class="companion-info" style="padding:24px; text-align:center;">
                        <h3>Marcus Reed</h3>
                        <p>Warm American Storyteller</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- WhatsApp 浮动按钮 -->
    <a href="https://wa.me/13045967785" class="whatsapp-float" target="_blank">💬</a>

</body>
</html>
