<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Whisper · 真人ASMR陪伴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d20;
  --card: rgba(20,20,50,0.85);
  --accent: #9b5de5;
  --accent-light: #c77dff;
  --text: #ffffff;
  --text-secondary: #b0b0c5;
  --btn-radius: 24px;
}

* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden;}
.container {max-width:1280px; margin:0 auto; padding:0 24px;}

.navbar {
  position:fixed; top:0; left:0; right:0; z-index:1000; padding:24px 0;
  display:flex; justify-content:space-between; align-items:center;
  transition: all 0.4s ease;
}
.navbar.scrolled {background: rgba(13,13,32,0.95); backdrop-filter: blur(12px); padding:16px 0;}

.logo {font-size:2rem; font-weight:700; color:white; text-decoration:none;}
.logo span {color: var(--accent);}

.hero {
  min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:180px 20px 120px;
  background: radial-gradient(circle at 50% 20%, #1a1a3c 0%, var(--bg) 70%);
}
.hero h1 {font-family:'Playfair Display', serif; font-size:clamp(3rem,8vw,5rem); line-height:1.1; margin-bottom:24px;}
.hero p {font-size:1.4rem; color:var(--text-secondary); max-width:720px; margin-bottom:50px;}
.btn-hero {background:var(--accent); color:#fff; padding:18px 50px; border-radius:var(--btn-radius); font-weight:600; font-size:1.15rem; text-decoration:none; transition: all 0.3s;}
.btn-hero:hover {transform: translateY(-3px); box-shadow:0 20px 50px rgba(155,93,229,0.35);}

.section {padding:120px 0;}
.section-header h2 {font-family:'Playfair Display', serif; font-size:2.8rem; text-align:center; margin-bottom:16px;}
.section-header p {text-align:center; color:var(--text-secondary); max-width:700px; margin:0 auto 60px;}

.grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:32px;
}

.companion-card {
  background: var(--card); border-radius:28px; overflow:hidden; transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.companion-card:hover {transform: translateY(-12px); box-shadow:0 30px 60px rgba(155,93,229,0.3);}
.companion-img {width:100%; height:360px; object-fit:cover; transition: transform 0.6s ease;}
.companion-card:hover .companion-img {transform: scale(1.05);}
.companion-info {padding:28px; text-align:center;}
.companion-info h3 {font-size:1.5rem; margin-bottom:6px;}
.companion-info p {color:var(--text-secondary); margin-bottom:12px;}
.status {display:inline-block; padding:4px 12px; background:#22c55e; color:#000; border-radius:30px; font-size:0.8rem; margin-bottom:10px;}

audio {width:100%; border-radius:12px;}

footer {text-align:center; padding:100px 20px 60px; color:var(--text-secondary); border-top:1px solid rgba(200,182,255,0.18);}
</style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="/" class="logo">Luna <span>Whisper</span></a>
  <a href="#booking" class="btn-hero">立即预约</a>
</nav>

<section class="hero container">
  <h1>今晚，让温柔的声音<br>陪你入睡</h1>
  <p>高颜值真人ASMR · 专属睡前陪伴 · 让你每晚都期待入睡</p>
  <a href="#booking" class="btn-hero">预约陪伴师 →</a>
</section>

<section class="section container" id="companions">
  <div class="section-header">
    <h2>我们的陪伴师</h2>
    <p>每一位都是精心挑选的真人，只为给你最美好的夜晚</p>
  </div>

  <div class="grid">
    <!-- 御姐 -->
    <div class="companion-card">
      <img src="https://i.ibb.co/TmG7vK5/ojie.jpg" class="companion-img" alt="御姐">
      <div class="companion-info">
        <span class="status">今晚在线</span>
        <h3>凌薇</h3>
        <p>御姐 · 成熟稳重声线</p>
        <audio controls preload="none"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
      </div>
    </div>

    <!-- 甜妹 -->
    <div class="companion-card">
      <img src="https://i.ibb.co/N6xTdrf/tianmei.jpg" class="companion-img" alt="甜妹">
      <div class="companion-info">
        <span class="status">最受欢迎</span>
        <h3>苏甜</h3>
        <p>甜妹 · 清甜治愈声线</p>
        <audio controls preload="none"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
      </div>
    </div>

    <!-- 萌妹 -->
    <div class="companion-card">
      <img src="https://i.ibb.co/m6sGxqM/mengmei.jpg" class="companion-img" alt="萌妹">
      <div class="companion-info">
        <h3>小萌</h3>
        <p>萌妹 · 软糯可爱声线</p>
        <audio controls preload="none"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg"></audio>
      </div>
    </div>
  </div>
</section>

<section class="section container" id="booking">
  <div class="section-header">
    <h2>预约陪伴师</h2>
    <p>填写信息并选择陪伴师，即刻享受高质量睡眠陪伴</p>
  </div>
  <form style="max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:16px;">
    <input type="text" placeholder="您的姓名" required style="padding:12px 16px; border-radius:12px; border:none;">
    <input type="tel" placeholder="手机号" required style="padding:12px 16px; border-radius:12px; border:none;">
    <select required style="padding:12px 16px; border-radius:12px; border:none;">
      <option value="">选择陪伴师</option>
      <option value="凌薇">凌薇 - 御姐</option>
      <option value="苏甜">苏甜 - 甜妹</option>
      <option value="小萌">小萌 - 萌妹</option>
    </select>
    <input type="datetime-local" required style="padding:12px 16px; border-radius:12px; border:none;">
    <button type="submit" class="btn-hero">提交预约并付款</button>
  </form>
</section>

<footer>
© 2025 Luna Whisper · 非医疗放松陪伴服务 · 所有对话严格保密
</footer
