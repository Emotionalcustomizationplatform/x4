  <style>
    :root {
      --bg: #0a0a1f;
      --card: rgba(255,255,255,0.06);
      --border: rgba(180,180,255,0.15);
      --accent: #c8b6ff;

    body {

      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      line-height: 1.6;

    .ambient-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 50% 20%, #1a1a3a 0%, #0a0a1f 70%);
    }
    .ambient-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(200,182,255,0.18) 0%, transparent 60%);
      animation: twinkle 15s infinite alternate ease-in-out;
    }
    @keyframes twinkle { 0% { opacity: 0.35; } 100% { opacity: 0.9; } }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 20px 0; transition: 0.4s; }
    .navbar.scrolled { background: rgba(10,10,31,0.95); backdrop-filter: blur(16px); padding: 14px 0; border-bottom: 1px solid var(--border); }

    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 120px 20px 80px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 8vw, 5rem); line-height: 1.1; margin-bottom: 24px; }
    .hero p { font-size: 1.25rem; color: var(--text-secondary); max-width: 680px; margin-bottom: 48px; }

    .trust-bar {
      display: flex; justify-content: center; gap: 40px; margin: 40px 0; padding: 24px 40px;
      background: var(--card); border-radius: 20px; border: 1px solid var(--border); flex-wrap: wrap;
    }
    .trust-number { font-size: 2rem; font-weight: 700; color: var(--accent); }

    .section { padding: 100px 0; border-top: 1px solid var(--border); }
    .section-header { text-align: center; margin-bottom: 60px; }
    .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2.6rem; margin-bottom: 16px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .companion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s ease;
    }
    .companion-card:hover {
      transform: translateY(-12px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(200,182,255,0.15);
    }
    .companion-img { width: 100%; height: 340px; object-fit: cover; }
    .companion-info { padding: 24px; text-align: center; }
    .companion-info audio { width: 100%; margin-top: 16px; border-radius: 12px; }
  </style>
