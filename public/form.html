<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约今晚的陪伴 | Luna Whisper</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#0a0a1f;
            --accent:#c8b6ff;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:var(--bg);
            color:#fff;
            font-family:'Inter',sans-serif;
            min-height:100vh;
            padding:20px;
            line-height:1.6;
        }

        .container{
            max-width:920px;
            margin:40px auto;
        }

        .lang-switch{
            position:fixed;
            top:20px;
            right:20px;
            display:flex;
            gap:4px;
            background:rgba(255,255,255,0.08);
            padding:5px;
            border-radius:999px;
            z-index:100;
            backdrop-filter:blur(20px);
        }

        .lang-btn{
            padding:8px 16px;
            border-radius:999px;
            cursor:pointer;
            transition:.2s;
        }

        .lang-btn.active{
            background:var(--accent);
            color:#000;
            font-weight:600;
        }

        .step{
            display:none;
        }

        .step.active{
            display:block;
            animation:fadeIn .4s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .card{
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(180,180,255,0.18);
            border-radius:24px;
            padding:28px;
            margin-bottom:20px;
            cursor:pointer;
            transition:all .3s ease;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card.selected{
            border-color:var(--accent);
            box-shadow:0 0 0 3px rgba(200,182,255,0.25);
        }

        .price{
            font-size:2.9rem;
            color:var(--accent);
            font-weight:700;
            margin:12px 0;
        }

        .form-input{
            width:100%;
            padding:16px 20px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,.1);
            border-radius:14px;
            color:#fff;
            margin-bottom:16px;
            font-size:1rem;
        }

        .form-input:focus{
            border-color:var(--accent);
            outline:none;
            box-shadow:0 0 0 4px rgba(200,182,255,.15);
        }

        .btn{
            width:100%;
            padding:16px;
            border-radius:999px;
            font-weight:600;
            font-size:1.08rem;
            cursor:pointer;
            margin-top:10px;
            border:none;
        }

        .btn-primary{
            background:var(--accent);
            color:#000;
        }

        .btn-secondary{
            background:transparent;
            color:#bbb;
            border:1px solid rgba(255,255,255,0.2);
        }

        .notice{
            background:rgba(200,182,255,0.1);
            border:1px solid var(--accent);
            border-radius:16px;
            padding:18px;
            margin:24px 0;
            font-size:0.95rem;
        }

        textarea{
            resize:vertical;
        }

        @media(max-width:768px){

            body{
                padding:16px;
            }

            .card{
                padding:24px;
            }

            .price{
                font-size:2.6rem;
            }

        }
    </style>
</head>
<body>

<div class="lang-switch" id="langSwitch">
    <div class="lang-btn">EN</div>
    <div class="lang-btn active">中文</div>
</div>

<div class="container">

    <form id="bookingForm">

        <!-- STEP 1 -->

        <div class="step active" id="step1">

            <h1 style="text-align:center;font-size:2.6rem;margin-bottom:8px;">
                选择陪伴时长
            </h1>

            <p style="text-align:center;color:#aaa;margin-bottom:40px;">
                单次付费 · 无订阅
            </p>

            <!-- 30 -->

            <div class="card"
                 data-plan="30min"
                 data-price="10">

                <h3>30 分钟</h3>

                <div class="price">$10</div>

                <p style="color:#bbb;">
                    轻柔耳语 + 情绪安抚
                </p>

            </div>

            <!-- 60 -->

            <div class="card selected"
                 data-plan="60min"
                 data-price="29">

                <h3>60 分钟</h3>

                <div class="price">$29</div>

                <p style="color:#c8b6ff;font-weight:600;">
                    最受欢迎
                </p>

                <p style="color:#bbb;">
                    个性化睡前陪伴 + 故事讲述
                </p>

            </div>

            <!-- 90 -->

            <div class="card"
                 data-plan="90min"
                 data-price="59">

                <h3>90 分钟 Premium</h3>

                <div class="price">$59</div>

                <p style="color:#bbb;">
                    深度放松 + 专属定制
                </p>

            </div>

            <input type="hidden"
                   id="planInput"
                   value="60min">

            <input type="hidden"
                   id="priceInput"
                   value="29">

            <button type="button"
                    class="btn btn-primary"
                    onclick="goToStep2()">

                下一步 →

            </button>

        </div>

        <!-- STEP 2 -->

        <div class="step"
             id="step2">

            <h1 style="text-align:center;font-size:2.4rem;margin-bottom:8px;">
                预约信息
            </h1>

            <p style="text-align:center;color:#aaa;margin-bottom:30px;">
                私密 · 真人陪伴
            </p>

            <input type="text"
                   name="name"
                   class="form-input"
                   placeholder="您的姓名"
                   required>

            <input type="email"
                   name="email"
                   class="form-input"
                   placeholder="邮箱地址"
                   required>

            <input type="tel"
                   name="whatsapp"
                   class="form-input"
                   placeholder="WhatsApp 号码（含国家代码）"
                   required>

            <input type="text"
                   name="preferred_time"
                   class="form-input"
                   placeholder="期望时间（如：今晚11点）"
                   required>

            <textarea name="special_request"
                      class="form-input"
                      rows="3"
                      placeholder="特殊需求（可选）"></textarea>

            <div class="notice">

                <strong>支付说明：</strong>

                点击支付后将跳转 PayPal。

                支付完成后我们会通过 WhatsApp 联系你。

            </div>

            <button type="button"
                    class="btn btn-secondary"
                    onclick="goBackToStep1()">

                ← 返回修改时长

            </button>

            <button type="button"
                    class="btn btn-primary"
                    onclick="submitBooking()">

                确认支付 $
                <span id="showPrice">29</span>

            </button>

        </div>

    </form>

</div>

<script>

const cards =
document.querySelectorAll('#step1 .card');

const planInput =
document.getElementById('planInput');

const priceInput =
document.getElementById('priceInput');

const showPrice =
document.getElementById('showPrice');



// ====================
// 套餐选择
// ====================

cards.forEach(card => {

    card.addEventListener('click', () => {

        cards.forEach(c => {

            c.classList.remove('selected');

        });

        card.classList.add('selected');

        const plan =
        card.dataset.plan;

        const price =
        card.dataset.price;

        planInput.value =
        plan;

        priceInput.value =
        price;

        showPrice.textContent =
        price;

    });

});



// ====================
// 下一步
// ====================

function goToStep2(){

    document.getElementById('step1')
    .classList.remove('active');

    document.getElementById('step2')
    .classList.add('active');

}



// ====================
// 返回
// ====================

function goBackToStep1(){

    document.getElementById('step2')
    .classList.remove('active');

    document.getElementById('step1')
    .classList.add('active');

}



// ====================
// 提交支付
// ====================

async function submitBooking(){

    const btn =
    document.querySelector('#step2 .btn-primary');

    const originalText =
    btn.innerHTML;

    btn.innerHTML =
    '正在跳转 PayPal...';

    btn.disabled = true;

    const form =
    document.getElementById('bookingForm');

    const formData =
    new FormData(form);

    const data = {

        name:
        formData.get('name'),

        email:
        formData.get('email'),

        whatsapp:
        formData.get('whatsapp'),

        preferred_time:
        formData.get('preferred_time'),

        special_request:
        formData.get('special_request'),

        session_plan:
        planInput.value

    };

    if(
        !data.name ||
        !data.email ||
        !data.whatsapp ||
        !data.preferred_time
    ){

        alert('请填写完整信息');

        btn.innerHTML =
        originalText;

        btn.disabled = false;

        return;

    }

    try{

        const response =
        await fetch('/api/submit', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)

        });

        const result =
        await response.json();

        if(result.redirect_url){

            window.location.href =
            result.redirect_url;

        }else{

            alert('支付链接生成失败');

            btn.innerHTML =
            originalText;

            btn.disabled = false;

        }

    }catch(err){

        console.error(err);

        alert('网络错误，请重试');

        btn.innerHTML =
        originalText;

        btn.disabled = false;

    }

}



// ====================
// 语言按钮 UI
// ====================

document.getElementById('langSwitch')
.addEventListener('click', e => {

    if(e.target.classList.contains('lang-btn')){

        document
        .querySelectorAll('.lang-btn')
        .forEach(btn => {

            btn.classList.remove('active');

        });

        e.target.classList.add('active');

    }

});

</script>

</body>
</html>
