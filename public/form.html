<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约你的睡眠陪伴 | Luna Whisper</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1f; --card: rgba(255,255,255,0.06); --border: rgba(180,180,255,0.18);
      --accent: #c8b6ff; --text: #fff; --text-secondary: #b0b0cc; --error: #ff6b6b;
    }
    body {
      background: radial-gradient(circle at 50% -20%, #1a1a3a 0%, #0a0a1f 60%);
      color: var(--text); font-family: 'Inter','Noto Sans SC',sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    body.zh { font-family: 'Noto Sans SC','Inter',sans-serif; }
    .container { width:100%; max-width:700px; padding:2rem; position:relative; }
    .step { display:none; }
    .step.active { display:block; animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    h2 { font-family:'Playfair Display',serif; font-size:2.4rem; text-align:center; margin-bottom:0.5rem; }
    .subtitle { color:var(--text-secondary); text-align:center; margin-bottom:2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:2rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem 1.5rem; cursor:pointer; transition:0.3s; text-align:center; }
    .card:hover,.card.selected { border-color:var(--accent); background:rgba(200,182,255,0.1); }
    .card-title { font-size:1.2rem; font-weight:600; }
    .card-desc { color:var(--text-secondary); font-size:0.9rem; margin-top:0.5rem; }
    .input-box { max-width:450px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
    input,textarea { width:100%; padding:16px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:#fff; border-radius:12px; font-size:1rem; box-sizing:border-box; }
    input:focus,textarea:focus { border-color:var(--accent); outline:none; }
    .btn-bar { display:flex; justify-content:center; gap:15px; margin-top:2rem; }
    .btn { padding:15px 40px; border-radius:50px; font-weight:600; cursor:pointer; border:none; transition:0.3s; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-back { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
    .price { font-size:2.5rem; color:var(--accent); font-weight:700; text-align:center; margin:1rem 0; }
    .lang-switch { position:absolute; top:15px; right:15px; display:flex; background:rgba(255,255,255,0.1); border-radius:50px; padding:5px; }
    .lang-btn { padding:8px 16px; border-radius:50px; cursor:pointer; font-size:0.85rem; }
    .lang-btn.active { background:var(--accent); color:#000; font-weight:600; }
  </style>
</head>
<body class="zh">
<div class="container">
  <div class="lang-switch" id="langSwitch">
    <div class="lang-btn active" data-lang="zh">中文</div>
    <div class="lang-btn" data-lang="en">EN</div>
  </div>
  <form id="bookingForm">
    <div class="step active" id="step1">
      <h2 data-en="Choose Your Experience" data-zh="选择你的体验">选择你的体验</h2>
      <p class="subtitle" data-en="$10 · 30-45 min · No subscription" data-zh="$10 (≈¥70) · 30-45分钟 · 无需订阅">$10 (≈¥70) · 30-45分钟 · 无需订阅</p>
      <div class="grid" id="typeGrid">
        <div class="card" data-type="ASMR Whisper" onclick="selectType(this)"><div class="card-title" data-en="ASMR Whisper" data-zh="ASMR耳语">ASMR耳语</div><div class="card-desc" data-en="Soft triggers, personal attention" data-zh="轻柔触发音，私人专注">轻柔触发音，私人专注</div></div>
        <div class="card" data-type="Bedtime Story" onclick="selectType(this)"><div class="card-title" data-en="Bedtime Story" data-zh="睡前故事">睡前故事</div><div class="card-desc" data-en="Cozy tales to drift off" data-zh="温暖故事伴你入眠">温暖故事伴你入眠</div></div>
        <div class="card" data-type="Emotional Support" onclick="selectType(this)"><div class="card-title" data-en="Emotional Support" data-zh="情感倾诉">情感倾诉</div><div class="card-desc" data-en="Talk through your day" data-zh="聊聊你的一天">聊聊你的一天</div></div>
      </div>
      <input type="hidden" id="typeInput" required>
      <p id="step1Error" style="color:var(--error); text-align:center; display:none;">请选择一种体验</p>
      <div class="btn-bar"><button type="button" class="btn btn-primary" onclick="nextStep(1)">继续 →</button></div>
    </div>
    <div class="step" id="step2">
      <h2 data-en="Your Details" data-zh="你的信息">你的信息</h2>
      <div class="input-box">
        <input type="text" name="name" placeholder="姓名 / Your Name" required>
        <input type="email" name="email" placeholder="邮箱 / Email" required>
        <input type="tel" name="whatsapp" placeholder="WhatsApp / 手机" required>
        <input type="text" name="preferred_time" placeholder="期望时间 e.g. 今晚10点 (UTC+8)" required>
        <textarea name="special_request" rows="3" placeholder="特殊要求（称呼、故事主题等）"></textarea>
        <div class="price">$10 <span style="font-size:1rem;">(≈ ¥70)</span></div>
      </div>
      <input type="hidden" name="session_plan" value="single">
      <input type="hidden" name="referrer" id="refInput">
      <div class="btn-bar">
        <button type="button" class="btn btn-back" onclick="prevStep()">← 返回</button>
        <button type="submit" class="btn btn-primary">✅ 支付 $10 并确认</button>
      </div>
    </div>
  </form>
  <div class="step" id="successView" style="text-align:center;padding:60px 20px;">
    <h2 data-en="Booking Confirmed!" data-zh="预约成功！">预约成功！</h2>
    <p class="subtitle" data-en="We'll confirm within 2 hours. Sweet dreams ✨" data-zh="我们将在2小时内确认，愿你今晚好梦 ✨">我们将在2小时内确认，愿你今晚好梦 ✨</p>
    <a href="/" class="btn btn-back" style="margin-top:30px;">← 返回首页</a>
  </div>
</div>
<script>
let currentStep = 1;
const form = document.getElementById('bookingForm');

// 语言切换
document.getElementById('langSwitch').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lang = btn.dataset.lang;
  document.body.className = lang === 'zh' ? 'zh' : '';
  document.querySelectorAll('[data-en]').forEach(el => el.textContent = el.getAttribute('data-'+lang));
});

document.getElementById('refInput').value = new URLSearchParams(window.location.search).get('ref') || '';

function selectType(el) {
  document.querySelectorAll('#typeGrid .card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('typeInput').value = el.dataset.type;
  document.getElementById('step1Error').style.display = 'none';
}
function nextStep(from) {
  if (from===1 && !document.getElementById('typeInput').value) {
    document.getElementById('step1Error').style.display = 'block';
    return;
  }
  switchStep(from+1);
}
function prevStep() { switchStep(currentStep-1); }
function switchStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  currentStep = n;
  window.scrollTo(0,0);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form));
  const btn = form.querySelector('button[type="submit"]');
  btn.textContent = '处理中...'; btn.disabled = true;
  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (json.status === 'success' && json.redirect_url) {
      window.location.href = json.redirect_url;
    } else {
      showSuccess();
    }
  } catch(err) {
    showSuccess();
  } finally {
    btn.textContent = '✅ 支付 $10 并确认'; btn.disabled = false;
  }
});

function showSuccess() {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('successView').classList.add('active');
}
</script>
</body>
</html>
