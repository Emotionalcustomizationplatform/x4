<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约你的睡眠陪伴 | Luna Whisper</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    :root { --bg: #0a0a1f; --card: rgba(255,255,255,0.06); --border: rgba(180,180,255,0.18); --accent: #c8b6ff; --text: #fff; --text-secondary: #b0b0cc; }
    body { background: radial-gradient(circle at 50% -20%, #1a1a3a 0%, #0a0a1f 60%); color: var(--text); font-family: 'Inter','Noto Sans SC',sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .container { width:100%; max-width:700px; padding:2rem; }
    .step { display:none; }
    .step.active { display:block; animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    h2 { font-family:'Playfair Display',serif; font-size:2.4rem; text-align:center; margin-bottom:0.5rem; }
    .subtitle { color:var(--text-secondary); text-align:center; margin-bottom:2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:2rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2rem 1.5rem; cursor:pointer; transition:0.3s; text-align:center; }
    .card:hover,.card.selected { border-color:var(--accent); background:rgba(200,182,255,0.1); }
    .input-box { max-width:450px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
    input,textarea { width:100%; padding:16px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:#fff; border-radius:12px; font-size:1rem; }
    input:focus,textarea:focus { border-color:var(--accent); outline:none; }
    .btn-bar { display:flex; justify-content:center; gap:15px; margin-top:2rem; }
    .btn { padding:15px 40px; border-radius:50px; font-weight:600; cursor:pointer; border:none; transition:0.3s; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-back { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
    .price { font-size:2.5rem; color:var(--accent); font-weight:700; text-align:center; margin:1rem 0; }
  </style>
</head>
<body class="zh">
<div class="container">
  <form id="bookingForm">
    <!-- Step 1: 选择体验 -->
    <div class="step active" id="step1">
      <h2>选择你的体验</h2>
      <p class="subtitle">$10 · 30-45分钟</p>
      <div class="grid" id="typeGrid">
        <div class="card" data-type="ASMR耳语" onclick="selectType(this)"><div class="card-title">ASMR耳语</div><div class="card-desc">轻柔触发，私人专注</div></div>
        <div class="card" data-type="睡前故事" onclick="selectType(this)"><div class="card-title">睡前故事</div><div class="card-desc">温暖故事伴你入眠</div></div>
        <div class="card" data-type="情感倾诉" onclick="selectType(this)"><div class="card-title">情感倾诉</div><div class="card-desc">聊聊你的一天</div></div>
      </div>
      <input type="hidden" id="typeInput" required>
      <div class="btn-bar"><button type="button" class="btn btn-primary" onclick="nextStep(1)">继续 →</button></div>
    </div>

    <!-- Step 2: 填写信息 -->
    <div class="step" id="step2">
      <h2>你的信息</h2>
      <div class="input-box">
        <input type="text" name="name" placeholder="姓名" required>
        <input type="email" name="email" placeholder="邮箱" required>
        <input type="tel" name="whatsapp" placeholder="WhatsApp / 手机号" required>
        <input type="text" name="preferred_time" placeholder="期望时间（如：今晚 22:30）" required>
        <textarea name="special_request" rows="3" placeholder="特殊要求（称呼、故事主题等）"></textarea>

        <div style="margin:20px 0; padding:16px; background:rgba(200,182,255,0.08); border-radius:12px; border:1px solid var(--border);">
          <label style="display:flex; align-items:center; gap:10px; font-weight:500; cursor:pointer;">
            <input type="checkbox" id="useBalance">
            <span>使用账户余额支付 <strong id="balanceShow">$0</strong></span>
          </label>
        </div>

        <div class="price">$10 <span style="font-size:1rem;">(≈ ¥70)</span></div>
      </div>

      <div class="btn-bar">
        <button type="button" class="btn btn-back" onclick="prevStep()">← 返回</button>
        <button type="submit" class="btn btn-primary">确认预约</button>
      </div>
    </div>
  </form>

  <!-- 成功页面 -->
  <div class="step" id="successView" style="text-align:center; padding:60px 20px;">
    <h2>预约成功！</h2>
    <p class="subtitle">我们将在2小时内确认陪伴师<br>愿你今晚好梦 ✨</p>
    <a href="/" class="btn btn-back" style="margin-top:30px;">← 返回首页</a>
  </div>
</div>

<script>
let currentStep = 1;
const form = document.getElementById('bookingForm');

function selectType(el) {
  document.querySelectorAll('#typeGrid .card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('typeInput').value = el.dataset.type;
}

function nextStep(from) {
  if (from === 1 && !document.getElementById('typeInput').value) {
    alert('请选择一种体验');
    return;
  }
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + (from + 1)).classList.add('active');
  currentStep = from + 1;
}

function prevStep() {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + (currentStep - 1)).classList.add('active');
  currentStep--;
}

// 加载余额
async function loadBalance() {
  const token = localStorage.getItem('luna_token');
  if (!token) return;
  try {
    const res = await axios.get('/api/user', { headers: { Authorization: `Bearer ${token}` } });
    document.getElementById('balanceShow').textContent = `$${res.data.balance || 0}`;
  } catch(e) {}
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = localStorage.getItem('luna_token');
  if (!token) return alert('请先登录');

  const useBalance = document.getElementById('useBalance').checked;
  const data = Object.fromEntries(new FormData(form));
  data.session_type = document.getElementById('typeInput').value;
  data.useBalance = useBalance;

  const btn = form.querySelector('button[type="submit"]');
  btn.textContent = '处理中...';
  btn.disabled = true;

  try {
    const res = await axios.post('/api/submit', data, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (res.data.status === 'success') {
      if (res.data.redirect_url) {
        window.location.href = res.data.redirect_url;
      } else {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('successView').classList.add('active');
      }
    }
  } catch (err) {
    alert(err.response?.data?.error || '提交失败');
  } finally {
    btn.textContent = '确认预约';
    btn.disabled = false;
  }
});

window.addEventListener('load', loadBalance);
</script>
</body>
</html>
