<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Private Sleep Session | Luna Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a1f;
            --surface: #111127;
            --card: rgba(255,255,255,0.06);
            --border: rgba(180,180,255,0.18);
            --accent: #c8b6ff;
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin:0; padding:20px; min-height:100vh; }
        body.zh { font-family: 'Noto Sans SC', 'Inter', sans-serif; }

        .container { max-width: 900px; margin: 40px auto; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(15px);} to {opacity:1; transform:translateY(0);} }

        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 28px; margin-bottom: 20px; 
            cursor: pointer; transition: all 0.3s;
        }
        .card:hover { transform: translateY(-4px); }
        .card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,182,255,0.2); }

        .price { font-size: 2.6rem; color: var(--accent); font-weight: 600; margin: 12px 0; }
        .form-input { width:100%; padding:16px 20px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:16px; }
        .form-input:focus { border-color: var(--accent); outline:none; }

        .btn { padding: 16px 40px; border-radius: 50px; font-weight: 600; width:100%; margin-top:20px; cursor:pointer; }
        .btn-primary { background: var(--accent); color:#000; font-size:1.1rem; }

        .lang-switch { position:fixed; top:20px; right:20px; background:rgba(255,255,255,0.1); padding:5px; border-radius:50px; z-index:100; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch" id="langSwitch">
        <div class="lang-btn active" data-lang="en">EN</div>
        <div class="lang-btn" data-lang="zh">中文</div>
    </div>

    <form id="bookingForm">
        <!-- Step 1 -->
        <div class="step active" id="step1">
            <h2 data-en="Choose Your Session" data-zh="选择陪伴时长" style="text-align:center;font-size:2.4rem;margin-bottom:8px;">Choose Your Session</h2>
            <p data-en="One-time payment • No subscription" data-zh="单次付费" style="text-align:center;color:#aaa;">One-time payment • No subscription</p>

            <div onclick="selectPlan(this)" class="card" data-plan="30min">
                <h3 data-en="30 Minutes" data-zh="30分钟">30 Minutes</h3>
                <div class="price">$69</div>
            </div>
            <div onclick="selectPlan(this)" class="card selected" data-plan="60min">
                <h3 data-en="60 Minutes" data-zh="60分钟">60 Minutes</h3>
                <div class="price">$119</div>
                <p style="color:var(--accent);"><strong>Most Popular</strong></p>
            </div>
            <div onclick="selectPlan(this)" class="card" data-plan="90min">
                <h3 data-en="90 Minutes Premium" data-zh="90分钟高端">90 Minutes Premium</h3>
                <div class="price">$199</div>
            </div>

            <input type="hidden" id="planInput" value="60min">
            <button type="button" class="btn btn-primary" onclick="goToStep2()">Continue →</button>
        </div>

        <!-- Step 2 -->
        <div class="step" id="step2">
            <h2 data-en="Your Booking Details" data-zh="预约信息">Your Booking Details</h2>
            
            <input type="text" name="name" class="form-input" placeholder="Your Name" required>
            <input type="email" name="email" class="form-input" placeholder="Email Address" required>
            <input type="tel" name="whatsapp" class="form-input" placeholder="WhatsApp Number" required>
            <input type="text" name="preferred_time" class="form-input" placeholder="Preferred Time (e.g. Tonight 11PM UTC)" required>
            <textarea name="special_request" class="form-input" rows="3" placeholder="Special requests (optional)"></textarea>

            <button type="button" class="btn btn-primary" onclick="submitBooking()">Confirm & Pay Now</button>
        </div>
    </form>
</div>

<script>
function selectPlan(el) {
    document.querySelectorAll('#step1 .card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('planInput').value = el.dataset.plan;
}

function goToStep2() {
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
}

async function submitBooking() {
    const plan = document.getElementById('planInput').value;
    let price = plan === '30min' ? 69 : plan === '60min' ? 119 : 199;

    // 模拟提交成功后跳转支付
    alert("✅ Booking received! Redirecting to payment...");
    
    // 跳转到 PayPal（请改成你自己的 PayPal 链接）
    window.location.href = `https://paypal.me/dpx710/${price}USD?memo=LunaWhisper_${Date.now()}`;
}

// 语言切换
document.getElementById('langSwitch').addEventListener('click', e => {
    if (!e.target.classList.contains('lang-btn')) return;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    
    const lang = e.target.dataset.lang;
    document.body.classList.toggle('zh', lang === 'zh');
});
</script>
</body>
</html>
