<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Center | Luna Whisper</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a1f;
            --surface-card: rgba(255, 255, 255, 0.06);
            --border: rgba(180, 180, 255, 0.15);
            --accent: #c8b6ff;
            --accent-glow: rgba(200, 182, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: #b0b0cc;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% -20%, #1a1a3a 0%, #0a0a1f 60%);
            padding: 20px;
        }

        .container {
            background: var(--surface-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            padding: 3.5rem 2.5rem;
            max-width: 480px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: ''; 
            position: absolute; 
            top: 0; left: 0; right: 0; 
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 1rem;
            font-size: 2.3rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.97rem;
            line-height: 1.6;
            margin-bottom: 2.8rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.8rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.78rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 1.1rem;
            border-radius: 12px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            border-radius: 50px;
            font-size: 1.05rem;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        #result-area {
            display: none;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .link-display {
            background: rgba(200, 182, 255, 0.08);
            border: 1px dashed var(--accent);
            padding: 1.3rem;
            color: var(--accent);
            word-break: break-all;
            font-family: monospace;
            font-size: 0.92rem;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 1rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s;
            z-index: 100;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="toast" id="copyToast">Link Copied Successfully!</div>

<div class="container">
    <h1>Partner Center</h1>
    <p>Generate your exclusive referral link and earn from every booking.</p>

    <div class="input-group">
        <label for="partnerName">Your Partner Name / ID</label>
        <input type="text" 
               id="partnerName" 
               placeholder="e.g. EmmaChen" 
               oninput="cleanInput(this)"
               onkeydown="if(event.key === 'Enter') generateLink()">
    </div>

    <button class="btn" onclick="generateLink()">Generate Referral Link</button>

    <div id="result-area">
        <label>Your Unique Referral Link</label>
        <div class="link-display" id="linkOutput"></div>
        
        <div class="action-row">
            <button class="btn-outline" onclick="copyLink()">Copy Link</button>
            <button class="btn-outline" onclick="testLink()">Test Link →</button>
        </div>
    </div>
</div>

<script>
    function cleanInput(el) {
        el.value = el.value.replace(/[^a-zA-Z0-9_]/g, '');
    }

    function generateLink() {
        const nameInput = document.getElementById('partnerName');
        const name = nameInput.value.trim();
        
        if (!name) {
            nameInput.style.borderColor = '#ff6b6b';
            setTimeout(() => nameInput.style.borderColor = '', 1200);
            return;
        }

        const baseUrl = window.location.origin;
        const finalUrl = `${baseUrl}/?ref=${encodeURIComponent(name)}`;

        document.getElementById('linkOutput').textContent = finalUrl;
        document.getElementById('result-area').style.display = 'block';
    }

    function copyLink() {
        const linkText = document.getElementById('linkOutput').textContent;
        if (linkText) {
            navigator.clipboard.writeText(linkText).then(() => {
                showToast();
            });
        }
    }

    function testLink() {
        const linkText = document.getElementById('linkOutput').textContent;
        if (linkText) window.open(linkText, '_blank');
    }

    function showToast() {
        const toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }
</script>

</body>
</html>
